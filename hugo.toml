baseURL = "https://cloud.buhlmadsen.dk/"
languageCode = "en-us"
title = "Cloud Notes"
theme = "LoveIt"

enableRobotsTXT = true
enableGitInfo = true
enableEmoji = true

[author]
  name = "Mikkel Buhl Madsen"

[params]
  version = "0.2.X"
  defaultTheme = "auto"
  description = "Notes on Azure, cloud infrastructure and DevOps"

  dateFormat = "2006-01-02"
  showReadingTime = true
  showWordCount = true
  [params.header]
    [params.header.title]
      name = "Cloud Notes"

  [params.favicon]
    color = "#ffffff"
    safari = "/favicon.png"
    apple = "/favicon.png"
    icon32 = "/favicon.png"
    icon16 = "/favicon.png"
    manifest = "/site.webmanifest"

  [params.author]
    name = "Mikkel Buhl Madsen"
    email = ""
    link = ""

  [params.home]
    [params.home.profile]
      enable = true
      avatarURL = "/images/avatar.jpg"
      title = "Cloud Notes"
      subtitle = "Notes on Azure, Devops and Infrastructure"
      typeit = true

[params.page]
  [params.page.toc]
    enable = true
    keepStatic = false
    auto = true

  [params.page.code]
    copy = true
    maxShownLines = 50

[menu]
  [[menu.main]]
    name = "Posts"
    url = "/posts/"
    weight = 1

  [[menu.main]]
    name = "Tags"
    url = "/tags/"
    weight = 2

  [[menu.main]]
    name = "About"
    url = "/about/"
    weight = 3